<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../main.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layer size-normalizer" id="wallpaperBase">
        <img id="wallpaperImg"></img>
        <video id="wallpaperVideo" autoplay muted loop playsinline></video>
    </div>

    <div class="layer blur1 lockscreen-layout">
        <div class="lockscreen-clock-main">
            <div class="lockscreen-clock-top">
                <div class="lockscreen-clock-time"></div>
                <div class="lockscreen-clock-seconds"></div>
            </div>
            <div class="lockscreen-clock-date"></div>
        </div>

        <div class="spacer"></div>

        <div class="lockscreen-swipe">
            <div class="size-normalizer drop-shadow lockscreen-swipe-img">
                <svg viewBox="0 0 284.929 284.929">
                    <path fill="#ffffff" d="M282.082,195.285L149.028,62.24c-1.901-1.903-4.088-2.856-6.562-2.856s-4.665,0.953-6.567,2.856L2.856,195.285 C0.95,197.191,0,199.378,0,201.853c0,2.474,0.953,4.664,2.856,6.566l14.272,14.271c1.903,1.903,4.093,2.854,6.567,2.854 c2.474,0,4.664-0.951,6.567-2.854l112.204-112.202l112.208,112.209c1.902,1.903,4.093,2.848,6.563,2.848 c2.478,0,4.668-0.951,6.57-2.848l14.274-14.277c1.902-1.902,2.847-4.093,2.847-6.566 C284.929,199.378,283.984,197.188,282.082,195.285z"/>
                </svg>
            </div>
            Swipe up to unlock
        </div>
    </div>

    <script src="../utils.js"></script>
    <script src="../storage.js"></script>
    <script src="../render.js"></script>
    <script src="render.js"></script>
    <script src="../user_interaction_check.js"></script>
</body>
</html>
